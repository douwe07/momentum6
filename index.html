<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum — calibrated goals, kept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12151c;
    --surface:#1a202b;
    --surface-2:#212938;
    --surface-3:#2a3344;
    --line:#2c3441;
    --line-soft:#232b38;
    --text:#f3f1ea;
    --muted:#8c93a3;
    --muted-2:#5b6270;
    --accent:#ff6a39;
    --accent-2:#e85a2a;
    --accent-soft:rgba(255,106,57,.14);
    --teal:#2fd8c4;
    --teal-soft:rgba(47,216,196,.13);
    --ice:#7dd3fc;
    --ice-soft:rgba(125,211,252,.14);
    --danger:#e5484d;
    --radius-lg:18px;
    --radius-md:12px;
    --radius-sm:8px;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1100px 600px at 85% -10%, rgba(255,106,57,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(47,216,196,.08), transparent 60%),
      var(--ink);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{font-family:var(--font-display); margin:0; letter-spacing:-0.01em;}
  p{margin:0;}
  button{font-family:var(--font-body); cursor:pointer;}
  input,textarea{font-family:var(--font-body);}
  a{color:inherit;}
  ::selection{background:var(--accent-soft); color:var(--text);}
  .mono{font-family:var(--font-mono);}
  .muted{color:var(--muted);}
  :focus-visible{outline:2px solid var(--teal); outline-offset:2px;}

  #app{min-height:100vh; display:flex;}
  .sidebar{
    width:248px; flex-shrink:0; border-right:1px solid var(--line-soft);
    padding:28px 20px; display:flex; flex-direction:column; gap:22px;
    position:sticky; top:0; height:100vh;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{width:30px;height:30px;flex-shrink:0;}
  .brand-name{font-size:18px; font-weight:700;}
  .nav{display:flex; flex-direction:column; gap:4px;}
  .nav-item{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius-sm);
    color:var(--muted); font-size:14px; font-weight:500; border:none; background:transparent;
    text-align:left; width:100%;
  }
  .nav-item svg{width:17px;height:17px; flex-shrink:0;}
  .nav-item:hover{background:var(--surface-2); color:var(--text);}
  .nav-item.active{background:var(--surface-2); color:var(--text);}
  .nav-goals{display:flex; flex-direction:column; gap:2px; margin-top:2px;}
  .nav-goals-label{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted-2); padding:6px 12px 2px;}
  .nav-goal-link{
    display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:var(--radius-sm);
    font-size:13px; color:var(--muted); border:none; background:none; text-align:left; width:100%;
  }
  .nav-goal-link:hover{background:var(--surface-2); color:var(--text);}
  .nav-goal-link .dot{width:6px;height:6px;border-radius:50%; background:var(--accent); flex-shrink:0;}
  .sidebar-foot{margin-top:auto; display:flex; flex-direction:column; gap:8px;}
  .account-row{display:flex; align-items:center; justify-content:space-between; font-size:12px; color:var(--muted-2);}
  .account-row button{background:none;border:none;color:var(--muted); display:flex; align-items:center; gap:5px; font-size:12px;}
  .account-row button:hover{color:var(--text);}
  .account-row button svg{width:13px;height:13px;}

  .topbar{
    display:none; position:sticky; top:0; z-index:20; background:rgba(18,21,28,.9); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line-soft); padding:14px 18px; align-items:center; justify-content:space-between; gap:8px;
  }
  .topbar-actions{display:flex; gap:8px;}
  .bottomnav{
    display:none; position:fixed; bottom:0; left:0; right:0; z-index:30; background:var(--surface);
    border-top:1px solid var(--line-soft); padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    justify-content:space-around;
  }
  .bottomnav button{
    background:none; border:none; color:var(--muted); display:flex; flex-direction:column; align-items:center;
    gap:3px; font-size:10px; padding:4px 10px;
  }
  .bottomnav button svg{width:19px;height:19px;}
  .bottomnav button.active{color:var(--accent);}

  main{flex:1; min-width:0; padding:36px 40px 100px;}
  .page{max-width:1080px; margin:0 auto; display:flex; flex-direction:column; gap:28px;}
  .page-head{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap;}
  .eyebrow{font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--teal); font-weight:600; margin-bottom:6px;}
  .page-title{font-size:28px; font-weight:700;}
  .page-sub{color:var(--muted); font-size:14px; margin-top:6px; max-width:520px;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border-radius:999px; font-weight:600; font-size:14px; border:1px solid transparent;
    padding:11px 20px; transition:transform .12s ease, background .15s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--accent); color:#1a0e08;}
  .btn-primary:hover{background:#ff7a4f;}
  .btn-ghost{background:transparent; border-color:var(--line); color:var(--text);}
  .btn-ghost:hover{background:var(--surface-2);}
  .btn-teal{background:var(--teal); color:#052623;}
  .btn-teal:hover{background:#48e2cf;}
  .btn-sm{padding:7px 14px; font-size:13px;}
  .btn-block{width:100%;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .icon-btn{
    width:32px;height:32px; border-radius:50%; border:1px solid var(--line); background:var(--surface-2);
    display:inline-flex; align-items:center; justify-content:center; color:var(--muted); flex-shrink:0;
  }
  .icon-btn:hover{color:var(--text); border-color:var(--muted);}
  .icon-btn.danger:hover{color:var(--danger); border-color:var(--danger);}
  .icon-btn svg{width:15px;height:15px;}
  .icon-btn-xs{width:24px;height:24px;}
  .icon-btn-xs svg{width:12px;height:12px;}

  .card{background:var(--surface); border:1px solid var(--line-soft); border-radius:var(--radius-lg); padding:22px;}
  .card-hover:hover{border-color:var(--line);}

  .stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  .stat-card{background:var(--surface); border:1px solid var(--line-soft); border-radius:var(--radius-md); padding:16px 18px;}
  .stat-num{font-family:var(--font-mono); font-size:26px; font-weight:600;}
  .stat-label{font-size:12px; color:var(--muted); margin-top:4px;}
  .stat-card.flame .stat-num{color:var(--accent);}

  .goal-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:16px;}
  .goal-card{display:flex; flex-direction:column; gap:14px; cursor:pointer;}
  .goal-card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .goal-card-title{font-size:16px; font-weight:600; line-height:1.3;}
  .diff-pill{
    font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.05em;
    padding:4px 9px; border-radius:999px; white-space:nowrap; flex-shrink:0;
  }
  .diff-Moderate{background:var(--teal-soft); color:var(--teal);}
  .diff-Hard{background:var(--accent-soft); color:var(--accent);}
  .diff-Extreme{background:rgba(229,72,77,.15); color:var(--danger);}
  .diff-Easy{background:rgba(140,147,163,.15); color:var(--muted);}
  .goal-meta{display:flex; gap:16px; font-size:12px; color:var(--muted);}
  .goal-meta b{color:var(--text); font-family:var(--font-mono); font-weight:600;}
  .progress-bar{height:6px; border-radius:999px; background:var(--surface-3); overflow:hidden;}
  .progress-bar > div{height:100%; background:linear-gradient(90deg, var(--teal), var(--accent));}
  .status-line{display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600;}
  .status-on{color:var(--teal);}
  .status-behind{color:var(--accent);}
  .empty-goals{
    border:1px dashed var(--line); border-radius:var(--radius-lg); padding:44px 24px; text-align:center;
    color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:14px;
  }

  .trail-wrap{overflow-x:auto; padding:6px 2px 10px;}
  .trail{display:flex; align-items:center; min-width:max-content;}
  .trail-seg{display:flex; align-items:center;}
  .trail-node{
    width:11px; height:11px; border-radius:50%; background:var(--surface-3); border:2px solid var(--line);
    flex-shrink:0; position:relative;
  }
  .trail-node.done{background:var(--teal); border-color:var(--teal);}
  .trail-node.current{background:var(--accent); border-color:var(--accent); width:14px; height:14px;
    box-shadow:0 0 0 5px var(--accent-soft);}
  .trail-line{height:3px; width:34px; background:var(--line); flex-shrink:0;}
  .trail-line.done{background:linear-gradient(90deg, var(--teal), var(--teal));}

  .stepper{display:flex; gap:8px; margin-bottom:4px;}
  .step-dot{flex:1; height:4px; border-radius:999px; background:var(--surface-3);}
  .step-dot.active{background:var(--teal);}
  .form-grid{display:flex; flex-direction:column; gap:18px;}
  .field label{display:block; font-size:13px; font-weight:600; margin-bottom:7px;}
  .field .hint{font-size:12px; color:var(--muted); margin-top:6px;}
  .field input, .field textarea, .field select{
    width:100%; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius-sm);
    color:var(--text); padding:11px 13px; font-size:14px;
  }
  .field textarea{resize:vertical; min-height:64px; font-family:var(--font-body);}
  .field input:focus, .field textarea:focus{border-color:var(--teal);}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:640px){.field-row{grid-template-columns:1fr;}}

  .loading-block{display:flex; flex-direction:column; align-items:center; gap:16px; padding:60px 20px; text-align:center;}
  .pulse-ring{width:52px; height:52px; border-radius:50%; border:3px solid var(--surface-3); border-top-color:var(--teal);
    animation:spin 0.9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-line{font-size:13px; color:var(--muted); font-family:var(--font-mono);}

  .compare-grid{display:grid; grid-template-columns:1fr auto 1fr; gap:18px; align-items:stretch;}
  @media (max-width:640px){.compare-grid{grid-template-columns:1fr;}}
  .compare-col{background:var(--surface-2); border-radius:var(--radius-md); padding:16px 18px; border:1px solid var(--line-soft);}
  .compare-col.result{border-color:var(--teal); background:linear-gradient(180deg, var(--teal-soft), transparent 60%);}
  .compare-arrow{display:flex; align-items:center; justify-content:center; color:var(--muted);}
  .compare-arrow svg{width:18px;height:18px;}
  @media (max-width:640px){.compare-arrow{transform:rotate(90deg); margin:0 auto;}}
  .compare-label{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:600; margin-bottom:10px;}
  .compare-target{font-size:16px; font-weight:600; line-height:1.4;}
  .compare-detail{font-size:13px; color:var(--muted); margin-top:8px;}

  .explain-box{
    background:var(--accent-soft); border:1px solid rgba(255,106,57,.3); border-radius:var(--radius-md);
    padding:14px 16px; font-size:13.5px; line-height:1.55; color:var(--text);
  }
  .why-box{background:var(--surface-2); border-radius:var(--radius-md); padding:14px 16px; border:1px solid var(--line-soft);}
  .why-box p{font-size:13.5px; line-height:1.6; font-style:italic; color:var(--muted);}
  .qcard{background:var(--surface-2); border:1px solid var(--line-soft); border-radius:var(--radius-md); padding:14px 16px;}
  .qcard .qtag{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--teal); font-weight:700; margin-bottom:6px;}

  .tabs{display:flex; gap:6px; border-bottom:1px solid var(--line-soft);}
  .tab-btn{
    background:none; border:none; color:var(--muted); font-size:14px; font-weight:600; padding:10px 4px;
    margin-right:18px; border-bottom:2px solid transparent;
  }
  .tab-btn.active{color:var(--text); border-color:var(--accent);}

  .sprint{border:1px solid var(--line-soft); border-radius:var(--radius-lg); overflow:hidden;}
  .sprint-head{
    display:flex; align-items:center; justify-content:space-between; padding:14px 18px; background:var(--surface); gap:10px;
  }
  .sprint-head-left{display:flex; align-items:center; gap:12px; min-width:0; flex:1;}
  .sprint-num{
    font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--teal); background:var(--teal-soft);
    padding:4px 9px; border-radius:999px; flex-shrink:0;
  }
  .sprint-title{font-size:14.5px; font-weight:600; outline:none; min-width:0;}
  .sprint-title[contenteditable="true"]:hover{background:var(--surface-2); border-radius:4px;}
  .sprint-progress{font-size:12px; color:var(--muted); font-family:var(--font-mono); flex-shrink:0;}
  .sprint-head-actions{display:flex; gap:6px; flex-shrink:0;}
  .sprint-toggle{background:none;border:none;color:var(--muted); display:flex;}
  .sprint-toggle svg{width:16px;height:16px; transition:transform .15s;}
  .sprint-toggle.collapsed svg{transform:rotate(-90deg);}
  .sprint-body{padding:4px 18px 16px; display:flex; flex-direction:column; gap:2px;}
  .task-row{display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-top:1px solid var(--line-soft);}
  .task-row:first-child{border-top:none;}
  .task-check{
    width:20px; height:20px; border-radius:6px; border:1.5px solid var(--line); flex-shrink:0; margin-top:1px;
    display:flex; align-items:center; justify-content:center; background:var(--surface-2);
  }
  .task-check.checked{background:var(--teal); border-color:var(--teal); color:#052623;}
  .task-check svg{width:12px;height:12px;}
  .task-body{flex:1; min-width:0;}
  .task-text{font-size:13.5px; line-height:1.5; outline:none;}
  .task-text[contenteditable="true"]:hover{background:var(--surface-2); border-radius:4px;}
  .task-text.done{color:var(--muted); text-decoration:line-through;}
  .task-ifthen{font-size:12px; color:var(--muted); margin-top:4px; display:flex; gap:6px;}
  .task-ifthen svg{width:13px;height:13px; flex-shrink:0; margin-top:1px; color:var(--ice);}
  .task-actions{display:flex; gap:4px; flex-shrink:0; opacity:.55;}
  .task-actions:hover{opacity:1;}
  .add-task-row{
    display:flex; align-items:center; gap:8px; padding:10px 0 2px; border-top:1px solid var(--line-soft); margin-top:4px;
  }
  .add-task-row button{background:none;border:none;color:var(--muted); font-size:13px; display:flex; align-items:center; gap:6px;}
  .add-task-row button:hover{color:var(--teal);}
  .add-week-btn{
    align-self:flex-start; background:none; border:1px dashed var(--line); color:var(--muted);
    padding:10px 16px; border-radius:var(--radius-md); font-size:13.5px; display:flex; align-items:center; gap:8px;
  }
  .add-week-btn:hover{color:var(--teal); border-color:var(--teal);}

  .streak-hero{display:flex; align-items:center; gap:28px; flex-wrap:wrap;}
  .streak-big{display:flex; align-items:center; gap:12px;}
  .streak-big svg{width:38px;height:38px;}
  .streak-num{font-family:var(--font-mono); font-size:34px; font-weight:600; line-height:1;}
  .streak-num-label{font-size:12px; color:var(--muted); margin-top:2px;}
  .streak-secondary{display:flex; gap:22px;}
  .streak-secondary .item{text-align:left;}
  .streak-secondary .n{font-family:var(--font-mono); font-size:18px; font-weight:600;}
  .streak-secondary .l{font-size:11px; color:var(--muted);}
  .freeze-chip{
    margin-left:auto; display:flex; align-items:center; gap:8px; background:var(--ice-soft); color:var(--ice);
    padding:8px 14px; border-radius:999px; font-size:12.5px; font-weight:600;
  }
  .freeze-chip svg{width:15px;height:15px;}

  .habit-row{display:flex; flex-direction:column; gap:10px; padding:16px 0; border-top:1px solid var(--line-soft);}
  .habit-row:first-child{border-top:none;}
  .habit-row-head{display:flex; align-items:center; justify-content:space-between;}
  .habit-name{font-size:13.5px; font-weight:600;}
  .habit-streak{font-size:12px; color:var(--accent); font-family:var(--font-mono); display:flex; align-items:center; gap:4px;}
  .grid-wrap{overflow-x:auto;}
  .day-grid{display:flex; gap:4px; min-width:max-content;}
  .day-cell{
    width:26px; height:26px; border-radius:7px; background:var(--surface-3); border:1px solid var(--line-soft);
    display:flex; align-items:center; justify-content:center; position:relative; flex-shrink:0;
  }
  .day-cell.future{opacity:.35; cursor:default;}
  .day-cell.done{background:var(--teal); border-color:var(--teal);}
  .day-cell.frozen{background:var(--ice); border-color:var(--ice);}
  .day-cell.today{box-shadow:0 0 0 2px var(--accent);}
  .day-cell svg{width:12px;height:12px; color:#0b1a18;}
  .day-cell .dnum{font-size:8px; color:var(--muted-2); font-family:var(--font-mono);}
  .day-cell.done .dnum, .day-cell.frozen .dnum{display:none;}

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%); background:var(--surface-3);
    border:1px solid var(--line); padding:12px 20px; border-radius:999px; font-size:13.5px; font-weight:600;
    display:flex; align-items:center; gap:8px; z-index:100; box-shadow:0 8px 30px rgba(0,0,0,.4);
    animation:toastin .25s ease;
  }
  @keyframes toastin{from{opacity:0; transform:translate(-50%,10px);} to{opacity:1; transform:translate(-50%,0);}}
  .toast svg{width:15px;height:15px; color:var(--teal);}
  .toast.err svg{color:var(--danger);}

  .confetti-piece{
    position:fixed; top:-10px; width:8px; height:8px; z-index:200; pointer-events:none;
    animation:fall 1.1s ease-in forwards;
  }
  @keyframes fall{to{transform:translateY(100vh) rotate(400deg); opacity:0;}}

  .auth-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; width:100%; padding:24px;}
  .auth-card{max-width:400px; width:100%; display:flex; flex-direction:column; gap:20px;}
  .auth-head{text-align:center; display:flex; flex-direction:column; gap:14px;}
  .auth-mark{width:48px; height:48px; margin:0 auto;}
  .auth-title{font-size:24px; font-weight:700;}
  .auth-sub{color:var(--muted); font-size:13.5px; line-height:1.6;}
  .auth-tabs{display:flex; background:var(--surface-2); border-radius:999px; padding:4px; gap:4px;}
  .auth-tab{flex:1; border:none; background:none; padding:9px; border-radius:999px; font-size:13.5px; font-weight:600; color:var(--muted);}
  .auth-tab.active{background:var(--surface-3); color:var(--text);}
  .auth-error{background:rgba(229,72,77,.12); border:1px solid rgba(229,72,77,.35); color:#ff9a9d; font-size:13px; padding:10px 13px; border-radius:var(--radius-sm);}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(8,10,14,.6); backdrop-filter:blur(3px); z-index:300;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .modal-box{max-width:440px; width:100%; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:24px; display:flex; flex-direction:column; gap:16px;}
  .modal-head{display:flex; align-items:center; justify-content:space-between;}
  .modal-title{font-size:17px; font-weight:700; display:flex; align-items:center; gap:9px;}
  .modal-title svg{width:18px;height:18px; color:var(--teal);}
  .key-status{display:flex; align-items:center; gap:7px; font-size:12.5px;}
  .key-status .dot{width:7px;height:7px;border-radius:50%;}
  .key-status.on .dot{background:var(--teal);}
  .key-status.off .dot{background:var(--muted-2);}

  @media (max-width:880px){
    .sidebar{display:none;}
    .topbar{display:flex;}
    .bottomnav{display:flex;}
    main{padding:20px 16px 90px;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
/* =========================================================================
   MOMENTUM — single-file prototype
   -------------------------------------------------------------------------
   Login here is real in the sense that it checks a hashed password against
   an account record, but the "backend" is the browser's own localStorage —
   there is no server, so accounts don't sync across devices and aren't
   recoverable if local storage is cleared. Good enough for a personal
   prototype, not a substitute for real auth infrastructure.

   Anthropic calls: the key entered in Settings is stored in localStorage
   and used to call api.anthropic.com directly from the browser. That means
   anyone with access to this browser (or to this page, if it's ever hosted
   somewhere multi-user) can read or use that key from devtools/network
   tab. Fine for a local/personal tool; if you ever deploy this publicly,
   route the API call through a small backend instead so the key never
   reaches the client.

   Pollinations calls: these now go through a serverless function at
   /api/pollinations instead of calling gen.pollinations.ai directly from
   the browser. The real key lives only in Vercel's environment variables
   (POLLINATIONS_API_KEY) and is read server-side inside api/pollinations.js
   — it is never sent to or stored in the browser. This file only needs to
   know whether a key has been configured on the server, which it checks
   via a small status endpoint.
   ========================================================================= */

const memoryStore = {};
const storage = {
  get(key, fallback){
    try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch(e){ return key in memoryStore ? memoryStore[key] : fallback; }
  },
  set(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }
    catch(e){ memoryStore[key] = val; }
  }
};

const DAY = 86400000;

function today(){ const d = new Date(); d.setHours(0,0,0,0); return d; }
function addDays(d, n){ return new Date(d.getTime() + n*DAY); }
function daysBetween(a,b){ return Math.round((b-a)/DAY); }
function niceDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString(undefined,{month:'short', day:'numeric', year:'numeric'});
}
function weeksBetween(aIso,bIso){
  return Math.max(1, Math.round(daysBetween(new Date(aIso), new Date(bIso))/7));
}

/* =========================================================================
   AUTH — client-only accounts (see notice above). Passwords are hashed
   with SHA-256 before being stored; still, this is not real security.
   ========================================================================= */
async function hashPassword(pw){
  // crypto.subtle requires a "secure context" (https, or http://localhost).
  // If this file is opened directly (file://) or over plain http on a LAN,
  // it may be unavailable — fall back to a simple non-cryptographic hash so
  // login still works. Either way this is client-only storage, not real
  // security (see notice at top of file).
  if (window.crypto && window.crypto.subtle){
    try{
      const enc = new TextEncoder().encode(pw);
      const buf = await window.crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }catch(e){ /* fall through to fallback below */ }
  }
  let h1 = 0xdeadbeef ^ pw.length, h2 = 0x41c6ce57 ^ pw.length;
  for(let i=0;i<pw.length;i++){
    const ch = pw.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 2654435761); h2 = Math.imul(h2 ^ ch, 1597334677);
  }
  h1 = Math.imul(h1 ^ (h1>>>16), 2246822507) ^ Math.imul(h2 ^ (h2>>>13), 3266489909);
  h2 = Math.imul(h2 ^ (h2>>>16), 2246822507) ^ Math.imul(h1 ^ (h1>>>13), 3266489909);
  return 'fb-' + (h1>>>0).toString(16).padStart(8,'0') + (h2>>>0).toString(16).padStart(8,'0');
}

/* =========================================================================
   MOCK "LLM" LOGIC — offline fallback used when no API key is set, or if
   a live call fails. Keeps the app fully functional standalone.

function difficultyTier(weeks){
  if (weeks <= 3) return 'Extreme';
  if (weeks <= 8) return 'Hard';
  if (weeks <= 20) return 'Moderate';
  return 'Easy';
}
function mockCalibrate(draft){
  const todayIso = fmt(today());
  let weeks = weeksBetween(todayIso, draft.targetDate);
  let adjustedDeadline = draft.targetDate;
  let noteParts = [];

  if (weeks <= 2){
    const newWeeks = 6;
    adjustedDeadline = fmt(addDays(new Date(todayIso), newWeeks*7));
    noteParts.push(`${weeks} week${weeks===1?'':'s'} isn't enough runway from your stated starting point, so we pushed the deadline out to ${niceDate(adjustedDeadline)} (about ${newWeeks} weeks) to keep the target realistic.`);
    weeks = newWeeks;
  } else {
    noteParts.push(`Your ${weeks}-week timeline is workable, so we kept the deadline as-is and tuned the target itself.`);
  }
  noteParts.push(`Given your baseline and the extra context you gave us, we calibrated the target to sit at roughly the 90th-percentile of difficulty for that timeframe — hard, but achievable if you stay consistent.`);
  if (draft.weeklyHours) noteParts.push(`We factored in the ~${draft.weeklyHours} hours/week you said you can realistically give this.`);

  const metricGuess = draft.baseline.match(/\d+[\d:.,]*\s?(km|k|miles?|mi|kg|lb|reps|min|hours?|hrs?|%|percent|days?|pages?|words?)/i);
  const metric = metricGuess ? `Track progress in ${metricGuess[0]}` : `Track progress against a single measurable number tied to: "${draft.title}"`;

  return {
    original: { title: draft.title, targetDate: draft.targetDate, baseline: draft.baseline },
    target: draft.title,
    metric,
    difficulty: difficultyTier(weeks),
    deadline: adjustedDeadline,
    weeks,
    explanation: noteParts.join(' '),
    why: draft.why || '', stakes: draft.stakes || '', obstacles: draft.obstacles || ''
  };
}
function mockBreakdown(calibrated){
  const numSprints = Math.min(12, Math.max(2, Math.round(calibrated.weeks)));
  const phaseNames = ['Foundation','Build volume','Add intensity','Consolidate','Sharpen','Peak','Taper','Hold form','Push threshold','Refine','Final push','Lock it in'];
  const sprints = [];
  const obstacleText = calibrated.obstacles && calibrated.obstacles.trim() ? calibrated.obstacles.trim() : 'something disrupts the plan';
  for(let i=0;i<numSprints;i++){
    const phase = phaseNames[i % phaseNames.length];
    const tasks = [
      { text: `Set this week's baseline session for "${calibrated.target}" and log the starting numbers.` },
      { text: `Complete ${2 + (i%2)} focused working sessions (1–2 hrs each) building toward ${calibrated.metric.toLowerCase()}.` },
      { text: `Review what worked this week and adjust next week's load up or down.`, ifThen: i===0 ? `If ${obstacleText}, then swap in the shortest viable version of the session rather than skipping it.` : null }
    ];
    if (i === numSprints-1) tasks.push({ text:`Final check against the calibrated target: ${calibrated.target}.` });
    sprints.push({ label: `Week ${i+1} — ${phase}`, tasks });
  }
  return sprints;
}
function toRuntimeSprints(rawSprints){
  return rawSprints.map((sp,i)=>({
    id: uid(), week: i+1, label: sp.label,
    tasks: sp.tasks.map(t=>({ id: uid(), text: t.text, done:false, ifThen: t.ifThen||null }))
  }));
}
function dailyActionsFromCalibrated(calibrated){
  return [
    { id: uid(), title: `Do a working session toward "${calibrated.target}"`, completions:{}, freezes:{} },
    { id: uid(), title: `Log progress against: ${calibrated.metric}`, completions:{}, freezes:{} },
  ];
}

/* =========================================================================
   REAL API
   -------------------------------------------------------------------------
   Anthropic: still called directly from the browser using a key stored in
   localStorage (see notice at top of file for the tradeoffs of that).

   Pollinations: called through this app's own serverless function at
   /api/pollinations. That function reads POLLINATIONS_API_KEY from
   Vercel's environment variables on the server and forwards the request —
   the browser never sees the real key. We only ask the server whether a
   key is configured (via /api/pollinations/status) so the UI can show
   "live calibration is on" without ever holding the key itself.
   ========================================================================= */
const API_KEY_PLACEHOLDER = 'YOUR_API_KEY_HERE';

function hasLiveKey(){
  return state.apiProvider === 'pollinations' ? state.pollinationsKeyConfigured : !!state.apiKey;
}

async function checkPollinationsKeyConfigured(){
  try{
    const res = await fetch('/api/pollinations/status');
    if (!res.ok) { state.pollinationsKeyConfigured = false; return; }
    const data = await res.json();
    state.pollinationsKeyConfigured = !!data.configured;
  }catch(e){
    state.pollinationsKeyConfigured = false;
  }
}

async function callLLM(system, userText, maxTokens=1200){
  return state.apiProvider === 'pollinations'
    ? callPollinations(system, userText, maxTokens)
    : callClaude(system, userText, maxTokens);
}

async function callClaude(system, userText, maxTokens=1200){
  const key = state.apiKey;
  if (!key) throw new Error('no-key');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key': key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:maxTokens,
      system,
      messages:[{ role:'user', content:userText }]
    })
  });
  if (!res.ok){
    const errText = await res.text().catch(()=>res.statusText);
    throw new Error('api-error: '+errText.slice(0,200));
  }
  const data = await res.json();
  const text = (data.content||[]).map(b=>b.text||'').join('\n');
  return text;
}

async function callPollinations(system, userText, maxTokens=1200){
  // The real key lives only server-side (Vercel env var POLLINATIONS_API_KEY),
  // read inside api/pollinations.js. This call never touches or transmits
  // the key itself.
  const res = await fetch('/api/pollinations', {
    method:'POST',
    headers:{ 'content-type':'application/json' },
    body: JSON.stringify({
      system,
      message: userText,
      max_tokens: maxTokens
    })
  });
  if (!res.ok){
    const errText = await res.text().catch(()=>res.statusText);
    throw new Error('api-error: '+errText.slice(0,200));
  }
  const data = await res.json();
  return data.text || '';
}
function parseJsonLoose(text){
  const cleaned = text.replace(/```json/gi,'').replace(/```/g,'').trim();
  return JSON.parse(cleaned);
}

async function apiFollowupQuestions(draft){
  const system = `You help calibrate personal goals. Given a goal, target date, and baseline, output ONLY a JSON object: {"questions": ["...", "...", "..."]} with 2-3 short, specific clarifying questions (not generic) that would materially change how hard/achievable this exact goal is. No prose, no markdown fences.`;
  const user = `Goal: ${draft.title}\nTarget date: ${draft.targetDate}\nBaseline: ${draft.baseline}`;
  const text = await callLLM(system, user, 400);
  const parsed = parseJsonLoose(text);
  if (!Array.isArray(parsed.questions)) throw new Error('bad-shape');
  return parsed.questions.slice(0,3);
}

async function apiCalibrate(draft){
  const system = `You calibrate personal goals against SMART criteria. Given the goal, baseline, target date, and follow-up context, decide if the timeline/target is realistic. If not, adjust the deadline or the target so the result sits at roughly the 90th-percentile of difficulty for the person's stated baseline and available time — hard but achievable. Output ONLY JSON, no markdown fences, matching exactly:
{"target": "...", "metric": "a single measurable way to track progress", "difficulty": "Easy|Moderate|Hard|Extreme", "deadline": "YYYY-MM-DD", "explanation": "2-4 plain-English sentences explaining any adjustment you made"}`;
  const user = `Goal: ${draft.title}\nOriginal target date: ${draft.targetDate}\nBaseline: ${draft.baseline}\nWeekly hours available: ${draft.weeklyHours||'not specified'}\nPast attempts / what's stopped them before: ${draft.pastAttempts||'not specified'}\nWhat usually gets in the way: ${draft.obstacles||'not specified'}\nWhy this matters to them: ${draft.why||'not specified'}\nExtra context: ${(draft.extraAnswers||[]).map(q=>`${q.q} -> ${q.a}`).join(' | ')||'none'}\nToday's date: ${fmt(today())}`;
  const text = await callLLM(system, user, 600);
  const parsed = parseJsonLoose(text);
  return {
    original:{ title:draft.title, targetDate:draft.targetDate, baseline:draft.baseline },
    target: parsed.target, metric: parsed.metric, difficulty: parsed.difficulty,
    deadline: parsed.deadline, weeks: weeksBetween(fmt(today()), parsed.deadline),
    explanation: parsed.explanation, why: draft.why||'', stakes: draft.stakes||'', obstacles: draft.obstacles||''
  };
}

async function apiBreakdown(calibrated){
  const system = `You break a calibrated personal goal into weekly sprints of small tasks (1-2 hours each, 3-4 tasks per week). Output ONLY JSON, no markdown fences, matching exactly:
{"sprints": [{"label": "Week 1 — <phase name>", "tasks": [{"text": "...", "ifThen": "optional if-then plan for an obstacle, or null"}]}]}
Number of sprints should roughly match the weeks available. Weave in the stated obstacle as an if-then plan on at least one task in week 1.`;
  const user = `Calibrated target: ${calibrated.target}\nMetric: ${calibrated.metric}\nDifficulty: ${calibrated.difficulty}\nWeeks available: ${calibrated.weeks}\nDeadline: ${calibrated.deadline}\nCommon obstacle: ${calibrated.obstacles||'none stated'}`;
  const text = await callLLM(system, user, 1800);
  const parsed = parseJsonLoose(text);
  if (!Array.isArray(parsed.sprints)) throw new Error('bad-shape');
  return parsed.sprints;
}

/* =========================================================================
   STREAK MATH
   ========================================================================= */
function isMarked(action, iso){ return !!(action.completions[iso] || action.freezes[iso]); }
function streakStats(action, createdIso){
  const start = new Date(createdIso);
  const end = today();
  const totalDays = Math.max(0, daysBetween(start,end));
  let longest = 0, run = 0, misses = 0;
  for(let i=0;i<=totalDays;i++){
    const iso = fmt(addDays(start,i));
    if (isMarked(action, iso)){ run++; misses=0; longest=Math.max(longest,run); }
    else{ misses++; if (misses>=2) run=0; }
  }
  let cur=0, m=0;
  for(let i=0;i<=totalDays;i++){
    const iso = fmt(addDays(end,-i));
    if (new Date(iso) < start) break;
    if (isMarked(action, iso)){ cur++; m=0; }
    else{ m++; if (m>=2) break; }
  }
  return { current:cur, longest: Math.max(longest,cur) };
}
function completionRateLastNDays(action, n){
  const end = today();
  let done=0;
  for(let i=0;i<n;i++){ if (isMarked(action, fmt(addDays(end,-i)))) done++; }
  return Math.round((done/n)*100);
}

function seedDemoGoal(){
  const createdIso = fmt(addDays(today(), -18));
  const calibrated = mockCalibrate({
    title: 'Run a sub-4-hour marathon',
    targetDate: fmt(addDays(today(), 70)),
    baseline: 'I currently run 5k in about 32 minutes, longest run so far is 12k.',
    why: "Proving to myself I can commit to something outside surfing that takes months, not weeks.",
    stakes: "If I don't, I keep telling myself the same 'next season' story.",
    obstacles: 'travel for competitions breaks up my training week'
  });
  const sprints = toRuntimeSprints(mockBreakdown(calibrated));
  const dailyActions = dailyActionsFromCalibrated(calibrated);
  dailyActions.forEach((a)=>{
    for(let i=18;i>=1;i--){
      const iso = fmt(addDays(today(),-i));
      const skip = (i===11 || i===12);
      const soloMiss = (i===5);
      if (!skip && !soloMiss) a.completions[iso]=true;
      if (i===12) a.freezes[iso]=true;
    }
  });
  sprints[0].tasks.forEach(t=>t.done=true);
  if (sprints[1]) sprints[1].tasks[0].done = true;
  return { id: uid(), title: calibrated.target, createdIso, calibrated, accepted:true, sprints, dailyActions };
}

      </div>
      <div class="card" style="text-align:left; display:flex; flex-direction:column; gap:16px;">

          <button class="auth-tab ${mode==='login'?'active':''}" data-authmode="login">Log in</button>
          <button class="auth-tab ${mode==='signup'?'active':''}" data-authmode="signup">Sign up</button>
        </div>
        ${state.calibratorError!=='' && false ? '' : ''}
        <div id="auth-error-slot">${state.authError ? `<div class="auth-error">${escapeHtml(state.authError)}</div>` : ''}</div>
        ${mode==='signup' ? `
        <div class="field"><label>Name</label><input id="a-name" placeholder="Your name" autocomplete="name"></div>` : ''}
        <div class="field"><label>Email</label><input id="a-email" type="email" placeholder="you@example.com" autocomplete="email"></div>
        <div class="field"><label>Password</label><input id="a-pass" type="password" placeholder="••••••••" autocomplete="${mode==='signup'?'new-password':'current-password'}"></div>
        <button class="btn btn-primary btn-block" id="a-submit">${mode==='signup'?'Create account':'Log in'} ${svgIcon('arrowRight')}</button>
        <p class="hint" style="text-align:center;">Stored only in this browser's local storage — there's no server behind this, so accounts don't carry over to other devices.</p>
      </div>
    </div>
  </div>`;
}

function bindAuth(){
  document.querySelectorAll('[data-authmode]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.authMode = el.getAttribute('data-authmode'); state.authError=''; render(); });
  });
  const submit = document.getElementById('a-submit');
  const go = async ()=>{
    const email = document.getElementById('a-email').value.trim().toLowerCase();
    const pass = document.getElementById('a-pass').value;
    if (!email || !pass){ state.authError = 'Enter an email and password.'; render(); return; }
    submit.disabled = true; submit.textContent = 'Please wait…';
    const accounts = getAccounts();
    if (state.authMode === 'signup'){
      const name = document.getElementById('a-name').value.trim();
      if (!name){ state.authError='Enter a name.'; render(); return; }
      if (accounts[email]){ state.authError='An account with that email already exists — try logging in.'; render(); return; }
      const passwordHash = await hashPassword(pass);
      accounts[email] = { name, passwordHash };
      saveAccounts(accounts);
      storage.set('mm_session', { email });
      state.user = { name, email };
      state.authError='';
      loadUserData();
      navigate('dashboard');
    } else {
      const acc = accounts[email];
      if (!acc){ state.authError='No account with that email — try signing up.'; render(); return; }
      const passwordHash = await hashPassword(pass);
      if (passwordHash !== acc.passwordHash){ state.authError='Wrong password.'; render(); return; }
      storage.set('mm_session', { email });
      state.user = { name: acc.name, email };
      state.authError='';
      loadUserData();
      navigate('dashboard');
    }
  };
  submit.addEventListener('click', go);
  document.getElementById('a-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
}
function logOut(){
  storage.set('mm_session', null);
  state.user = null; state.goals = []; state.apiKey=''; state.apiProvider='anthropic'; state.pollinationsKeyConfigured=false;
  render();
}

function openSettingsModal(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  let provider = state.apiProvider; // local to the modal until saved

  function bodyHtml(){
    const isAnthropic = provider === 'anthropic';
    return `
      <div class="auth-tabs" style="margin-bottom:2px;">
        <button class="auth-tab ${isAnthropic?'active':''}" data-provider="anthropic">Anthropic</button>
        <button class="auth-tab ${!isAnthropic?'active':''}" data-provider="pollinations">Pollinations</button>
      </div>
      ${isAnthropic ? `
        <p class="hint" style="margin:0;">Calls api.anthropic.com directly from this browser. The key is stored only in this browser's local storage — never commit a real key into the HTML file itself, since anyone viewing the page or the repo would see it.</p>
        <div class="field">
          <label>Anthropic API key</label>
          <input id="modal-key" type="password" placeholder="${API_KEY_PLACEHOLDER}" value="${escapeHtml(state.apiKey)}" autocomplete="off">
        </div>
        <div class="key-status ${state.apiKey?'on':'off'}"><span class="dot"></span>${state.apiKey? 'Live calibration is on (Anthropic)' : 'Currently using offline mock calibration'}</div>
      ` : `
        <p class="hint" style="margin:0;">Pollinations calls are routed through this app's own server (a Vercel serverless function), which reads the key from the <b>POLLINATIONS_API_KEY</b> environment variable configured in your Vercel project. There's nothing to enter here — the key never lives in the browser.</p>
        <div class="key-status ${state.pollinationsKeyConfigured?'on':'off'}"><span class="dot"></span>${state.pollinationsKeyConfigured? 'Live calibration is on (Pollinations, server-side key detected)' : 'No POLLINATIONS_API_KEY found on the server — using offline mock calibration'}</div>
        <p class="hint" style="margin:0;">To set or change it: Vercel dashboard → your project → Settings → Environment Variables → <b>POLLINATIONS_API_KEY</b>, then redeploy.</p>
      `}
    `;
  }

  function render_(){
    overlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-head">
          <div class="modal-title">${svgIcon('key')} API key</div>
          <button class="icon-btn" id="modal-close">${svgIcon('x')}</button>
        </div>
        ${bodyHtml()}
        <div style="display:flex; justify-content:${provider==='anthropic'?'space-between':'flex-end'}; gap:10px;">
          ${provider==='anthropic' ? `<button class="btn btn-ghost btn-sm" id="modal-clear">Remove this key</button>` : ''}
          <button class="btn btn-primary btn-sm" id="modal-save">${provider==='anthropic'?'Save':'Done'}</button>
        </div>
      </div>`;
    bind_();
  }

  function bind_(){
    const close = ()=> overlay.remove();
    document.getElementById('modal-close').addEventListener('click', close);
    overlay.querySelectorAll('[data-provider]').forEach(el=>{
      el.addEventListener('click', ()=>{ provider = el.getAttribute('data-provider'); render_(); });
    });
    document.getElementById('modal-save').addEventListener('click', async ()=>{
      state.apiProvider = provider;
      if (provider === 'anthropic'){
        state.apiKey = document.getElementById('modal-key').value.trim();
        persistApiKey();
      } else {
        await checkPollinationsKeyConfigured();
      }
      persistApiProvider();
      close();
      render();
      showToast(hasLiveKey() ? `Live calibration is on (${provider}).` : 'No key configured — using offline mock calibration.', 'check');
    });
    if (provider === 'anthropic'){
      document.getElementById('modal-clear').addEventListener('click', ()=>{
        state.apiKey=''; persistApiKey();
        close(); render();
        showToast('API key removed.', 'check');
      });
    }
    overlay.addEventListener('click', (e)=>{ if (e.target===overlay) close(); });
  }

  document.body.appendChild(overlay);
  render_();
}

function renderDashboard(){

  },0);
  const totalTasks = goals.reduce((s,g)=>s+g.sprints.reduce((s2,sp)=>s2+sp.tasks.length,0),0);
  const doneTasks = goals.reduce((s,g)=>s+g.sprints.reduce((s2,sp)=>s2+sp.tasks.filter(t=>t.done).length,0),0);
  const avgRate = goals.length ? Math.round(goals.reduce((s,g)=>s+ (g.dailyActions[0]?completionRateLastNDays(g.dailyActions[0],7):0),0)/goals.length) : 0;

  return `

function renderGoalCard(g){
  const totalTasks = g.sprints.reduce((s,sp)=>s+sp.tasks.length,0);
  const doneTasks = g.sprints.reduce((s,sp)=>s+sp.tasks.filter(t=>t.done).length,0);
  const pct = totalTasks ? Math.round(doneTasks/totalTasks*100) : 0;
  const bestAction = g.dailyActions.reduce((best,a)=>{
    const s = streakStats(a, g.createdIso);
    return s.current > (best?best.current:-1) ? s : best;
  }, null) || {current:0,longest:0};
  const daysLeft = daysBetween(today(), new Date(g.calibrated.deadline));
  const totalWeeks = Math.max(1, weeksBetween(fmt(today()),g.calibrated.deadline));
  const onTrack = pct >= Math.max(0, 100 - Math.round(daysLeft / totalWeeks * 8));

  return `
  <div class="card card-hover goal-card" data-goal-card="${g.id}">
    <div class="goal-card-top">
      <div class="goal-card-title">${escapeHtml(g.title)}</div>

      <span>${svgIcon('calendar')} Due <b>${niceDate(g.calibrated.deadline)}</b></span>
      <span>${svgIcon('flame')} <b>${bestAction.current}</b>d streak</span>
    </div>

      <div class="progress-bar"><div style="width:${pct}%"></div></div>
      <div style="display:flex; justify-content:space-between; margin-top:6px;">
        <span class="status-line ${onTrack?'status-on':'status-behind'}">${onTrack?'On track':'Falling behind'}</span>
        <span class="mono" style="font-size:12px;">${pct}% of sprint tasks</span>
      </div>
    </div>
  </div>`;
}

const DEFAULT_QUESTIONS = [
  { key:'weeklyHours', q:'Roughly how many hours a week can you realistically give this?' },
  { key:'pastAttempts', q:"Have you tried something like this before? What made it stall out last time?" },
  { key:'obstacles', q:'What usually gets in the way, day to day?' },
  { key:'why', q:'What does hitting this goal mean to you?' },
  { key:'stakes', q:"What happens if you don't do it?" },
];

function renderCalibrate(){
  const step = state.calibratorStep;
  return `
  <div class="page" style="max-width:760px;">
    <div>
      <div class="eyebrow">New goal</div>
      <h1 class="page-title">Calibrate a goal</h1>
      <p class="page-sub">Tell us what you're aiming for, answer a few follow-ups, and we'll hand back a target that's hard, but actually achievable. ${hasLiveKey() ? `<span class="mono" style="color:var(--teal);">Live calibration is on (${state.apiProvider}).</span>` : ''}</p>
    </div>
    <div class="stepper">
      <div class="step-dot ${step>=0?'active':''}"></div>
      <div class="step-dot ${step>=1?'active':''}"></div>
      <div class="step-dot ${step>=2?'active':''}"></div>
      <div class="step-dot ${step>=3?'active':''}"></div>
    </div>
    <div class="card">
      ${step===0 ? renderCalibrateBasics() : step===1 ? renderCalibrateFollowup() : step===2 ? renderCalibrateLoading() : renderCalibrateResult()}

}

function renderCalibrateBasics(){
  const d = state.calibratorDraft || {};

  <div class="form-grid">

function renderCalibrateFollowup(){

  }

function renderCalibrateResult(){

           · <span class="diff-pill diff-${c.difficulty}">${c.difficulty}</span>
        </div>

      </div>

    ${(c.why||c.stakes) ? `<div class="why-box">
      ${c.why?`<p>"${escapeHtml(c.why)}"</p>`:''}
      ${c.stakes?`<p style="margin-top:8px;">If not: "${escapeHtml(c.stakes)}"</p>`:''}
    </div>`:''}
    <div style="display:flex; justify-content:flex-end; gap:10px;">
      <button class="btn btn-ghost" id="c-back">Edit answers</button>
      <button class="btn btn-primary" id="c-accept">Accept &amp; build my roadmap ${svgIcon('arrowRight')}</button>
    </div>
  </div>`;
}

function bindCalibrate(){
  if (state.calibratorStep===0){
    document.getElementById('c-next').addEventListener('click', async ()=>{
      const title = document.getElementById('c-title').value.trim();
      const targetDate = document.getElementById('c-date').value;
      const baseline = document.getElementById('c-baseline').value.trim();
      if (!title || !targetDate || !baseline){ showToast('Fill in the goal, target date, and baseline first.', 'x'); return; }
      state.calibratorDraft = { title, targetDate, baseline, extraQuestions:[], extraAnswers:[] };
      state.calibratorStep = 1;
      state.calibratorBusy = hasLiveKey();
      render();
      if (hasLiveKey()){
        try{
          const qs = await apiFollowupQuestions(state.calibratorDraft);
          state.calibratorDraft.extraQuestions = qs;
          state.calibratorDraft.extraAnswers = qs.map(q=>({q, a:''}));
        }catch(e){ /* fall back silently to default questions only */ }
      }
      state.calibratorBusy = false;
      render();
    });
  }
  if (state.calibratorStep===1){
    document.querySelectorAll('[data-followup]').forEach(el=>{
      el.addEventListener('input', ()=>{ state.calibratorDraft[el.getAttribute('data-followup')] = el.value; });
    });
    document.querySelectorAll('[data-extra-q]').forEach(el=>{
      el.addEventListener('input', ()=>{
        const i = +el.getAttribute('data-extra-q');
        state.calibratorDraft.extraAnswers[i].a = el.value;
      });
    });
    document.getElementById('c-back-basics').addEventListener('click', ()=>{ state.calibratorStep=0; render(); });
    document.getElementById('c-calibrate').addEventListener('click', async ()=>{
      state.calibratorStep = 2;
      state.calibratorError = '';
      render();
      const lines = ['Checking SMART criteria','Comparing target to your baseline','Weighing your follow-up answers','Tuning difficulty to ~90th percentile','Finalizing calibrated target'];
      let i=0;
      const lineEl = ()=>document.getElementById('c-loading-line');
      const interval = setInterval(()=>{ i++; if (lineEl()) lineEl().textContent = lines[Math.min(i,lines.length-1)]; }, 380);
      let calibrated;
      try{
        if (hasLiveKey()) calibrated = await apiCalibrate(state.calibratorDraft);
        else calibrated = mockCalibrate(state.calibratorDraft);
      }catch(e){
        calibrated = mockCalibrate(state.calibratorDraft);
        state.calibratorError = 'Could not reach the live API, so this was calibrated offline instead. You can still edit everything below.';
      }
      clearInterval(interval);
      const minWait = new Promise(r=>setTimeout(r, 1200));
      await minWait;
      state.calibratorDraft.calibrated = calibrated;
      state.calibratorStep = 3;
      render();
    });
  }
  if (state.calibratorStep===3){
    document.getElementById('c-back').addEventListener('click', ()=>{ state.calibratorStep = 1; render(); });
    document.getElementById('c-accept').addEventListener('click', async (e)=>{
      const btn = e.currentTarget;
      btn.disabled = true; btn.textContent = 'Building roadmap…';
      const c = state.calibratorDraft.calibrated;
      c.target = document.getElementById('c-edit-target').textContent.trim();
      c.metric = document.getElementById('c-edit-metric').textContent.trim();
      let rawSprints;
      try{
        rawSprints = hasLiveKey() ? await apiBreakdown(c) : mockBreakdown(c);
      }catch(err){
        rawSprints = mockBreakdown(c);
        showToast('Could not reach the live API — built the roadmap offline instead.', 'x');
      }
      const sprints = toRuntimeSprints(rawSprints);
      const dailyActions = dailyActionsFromCalibrated(c);
      const goal = { id: uid(), title: c.target, createdIso: fmt(today()), calibrated: c, accepted:true, sprints, dailyActions };
      state.goals.unshift(goal);
      persistGoals();
      state.calibratorDraft = null; state.calibratorStep = 0; state.calibratorError='';
      navigate('goal', {id: goal.id, tab:'roadmap'});
      showToast('Goal calibrated and roadmap built.', 'check');
    });
  }
}

        <p class="page-sub">${escapeHtml(g.calibrated.metric)}</p>
      </div>
      <button class="icon-btn danger" data-delete-goal="${g.id}" title="Delete goal">${svgIcon('trash')}</button>
    </div>

    <div class="trail-wrap">
      <div class="trail">
        ${g.sprints.map((sp,i)=>{
          const spDone = sp.tasks.length>0 && sp.tasks.every(t=>t.done);
          const isCurrent = !spDone && sp.tasks.some(t=>!t.done) && (i===0 || g.sprints[i-1].tasks.every(t=>t.done));
          const lineDone = i>0 && g.sprints[i-1].tasks.every(t=>t.done);
          return `${i>0?`<div class="trail-line ${lineDone?'done':''}"></div>`:''}<div class="trail-seg"><div class="trail-node ${spDone?'done':''} ${isCurrent?'current':''}" title="${escapeHtml(sp.label)}"></div></div>`;
        }).join('')}
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn ${tab==='roadmap'?'active':''}" data-tab="roadmap">Roadmap</button>
      <button class="tab-btn ${tab==='tracker'?'active':''}" data-tab="tracker">Habit tracker</button>
    </div>

    ${tab==='roadmap' ? renderRoadmapTab(g) : renderTrackerTab(g)}
  </div>`;
}

function renderRoadmapTab(g){
  return `
  <div style="display:flex; flex-direction:column; gap:14px;">
    ${g.sprints.map(sp=>{
      const done = sp.tasks.filter(t=>t.done).length;
      return `
      <div class="sprint">
        <div class="sprint-head">
          <div class="sprint-head-left">
            <button class="sprint-toggle ${sp.collapsed?'collapsed':''}" data-toggle-sprint="${sp.id}">${svgIcon('chev')}</button>
            <span class="sprint-num">W${sp.week}</span>
            <span class="sprint-title" contenteditable="true" data-edit-sprint-title="${sp.id}">${escapeHtml(sp.label)}</span>
          </div>
          <div class="sprint-head-actions">
            <span class="sprint-progress">${done}/${sp.tasks.length}</span>
            <button class="icon-btn icon-btn-xs danger" data-delete-sprint="${sp.id}" title="Delete this week">${svgIcon('trash')}</button>
          </div>
        </div>
        <div class="sprint-body" data-sprint-body="${sp.id}" style="${sp.collapsed?'display:none;':''}">
          ${sp.tasks.map(t=>`
            <div class="task-row">
              <button class="task-check ${t.done?'checked':''}" data-toggle-task="${sp.id}|${t.id}">${t.done?svgIcon('check'):''}</button>
              <div class="task-body">
                <div class="task-text ${t.done?'done':''}" contenteditable="true" data-edit-task="${sp.id}|${t.id}">${escapeHtml(t.text)}</div>
                ${t.ifThen ? `<div class="task-ifthen">${svgIcon('snow')}<span contenteditable="true" data-edit-ifthen="${sp.id}|${t.id}">${escapeHtml(t.ifThen)}</span></div>` : ''}
              </div>
              <div class="task-actions">
                <button class="icon-btn icon-btn-xs" data-delete-task="${sp.id}|${t.id}" title="Delete step">${svgIcon('x')}</button>
              </div>
            </div>`).join('')}
          <div class="add-task-row">
            <button data-add-task="${sp.id}">${svgIcon('plus')} Add a step</button>
          </div>
        </div>
      </div>`;
    }).join('')}
    <button class="add-week-btn" id="add-week">${svgIcon('plus')} Add a week</button>
  </div>`;
}

function renderTrackerTab(g){
  const best = g.dailyActions.reduce((b,a)=>{
    const s = streakStats(a, g.createdIso);
    return s.current > (b?b.current:-1) ? {...s, action:a} : b;
  }, null) || {current:0,longest:0};

  const monthKey = fmt(today()).slice(0,7);
  const usedFreezes = g.dailyActions.reduce((s,a)=> s + Object.keys(a.freezes).filter(d=>d.startsWith(monthKey)).length, 0);
  const remainingFreezes = Math.max(0, state.freezeBudget - usedFreezes);
  const NDAYS = 21;
  return `
  <div style="display:flex; flex-direction:column; gap:22px;">
    <div class="card">
      <div class="streak-hero">
        <div class="streak-big">
          <span style="color:var(--accent);">${svgIcon('flame')}</span>
          <div><div class="streak-num">${best.current}</div><div class="streak-num-label">current streak (days)</div></div>
        </div>
        <div class="streak-secondary">
          <div class="item"><div class="n">${best.longest}</div><div class="l">longest streak</div></div>
          <div class="item"><div class="n">${completionRateLastNDays(g.dailyActions[0]||{completions:{},freezes:{}},7)}%</div><div class="l">last 7 days</div></div>
          <div class="item"><div class="n">${completionRateLastNDays(g.dailyActions[0]||{completions:{},freezes:{}},30)}%</div><div class="l">last 30 days</div></div>
        </div>
        <div class="freeze-chip">${svgIcon('snow')} ${remainingFreezes} freeze${remainingFreezes===1?'':'s'} left this month</div>
      </div>
    </div>
    <div class="card">
      ${g.dailyActions.map(a=>{
        const s = streakStats(a, g.createdIso);
        const days = []; for(let i=NDAYS-1;i>=0;i--) days.push(fmt(addDays(today(),-i)));
        const todayIso = fmt(today());
        return `
        <div class="habit-row">
          <div class="habit-row-head">
            <div class="habit-name">${escapeHtml(a.title)}</div>
            <div class="habit-streak">${svgIcon('flame')} ${s.current}d</div>
          </div>
          <div class="grid-wrap"><div class="day-grid">
            ${days.map(iso=>{
              const isFuture = iso > todayIso;
              const isToday = iso===todayIso;
              const done = !!a.completions[iso]; const frozen = !!a.freezes[iso];
              const dnum = new Date(iso+'T00:00:00').getDate();
              let cls = 'day-cell'; if (isFuture) cls += ' future'; if (done) cls += ' done'; if (frozen) cls += ' frozen'; if (isToday) cls += ' today';
              return `<div class="${cls}" ${isFuture?'':`data-day-cell="${g.id}|${a.id}|${iso}"`} title="${iso}">${done?svgIcon('check'):frozen?svgIcon('snow'):`<span class="dnum">${dnum}</span>`}</div>`;
            }).join('')}
          </div></div>
        </div>`;
      }).join('')}
      <p class="hint" style="margin-top:12px;">Tap a past day to mark it done. Shift-tap (or long-press on mobile) to use a freeze instead, if you have one left.</p>
    </div>
  </div>`;
}

function bindGoal(id){
  const g = getGoal(id);

  document.querySelectorAll('[data-tab]').forEach(el=> el.addEventListener('click', ()=> navigate('goal', {id, tab: el.getAttribute('data-tab')})));

  const delBtn = document.querySelector('[data-delete-goal]');
  if (delBtn) delBtn.addEventListener('click', ()=>{
    if (confirm('Delete this goal? This removes its roadmap and habit history.')){
      state.goals = state.goals.filter(x=>x.id!==id);
      persistGoals();
      navigate('dashboard');
    }
  });

  document.querySelectorAll('[data-toggle-sprint]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const sp = g.sprints.find(s=>s.id===el.getAttribute('data-toggle-sprint'));
      sp.collapsed = !sp.collapsed;
      persistGoals();
      render();
    });
  });

  document.querySelectorAll('[data-delete-sprint]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const spId = el.getAttribute('data-delete-sprint');
      if (!confirm('Delete this week and its steps?')) return;
      g.sprints = g.sprints.filter(s=>s.id!==spId);
      persistGoals(); render();
    });
  });

  document.getElementById('add-week') && document.getElementById('add-week').addEventListener('click', ()=>{
    g.sprints.push({ id: uid(), week: g.sprints.length+1, label:`Week ${g.sprints.length+1} — New week`, tasks:[] });
    persistGoals(); render();
  });

  document.querySelectorAll('[data-add-task]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const sp = g.sprints.find(s=>s.id===el.getAttribute('data-add-task'));
      sp.tasks.push({ id: uid(), text:'New step', done:false, ifThen:null });
      persistGoals(); render();
    });
  });

  document.querySelectorAll('[data-toggle-task]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const [spId, taskId] = el.getAttribute('data-toggle-task').split('|');
      const sp = g.sprints.find(s=>s.id===spId);
      const t = sp.tasks.find(t=>t.id===taskId);
      t.done = !t.done;
      persistGoals(); render();
    });
  });

  document.querySelectorAll('[data-delete-task]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const [spId, taskId] = el.getAttribute('data-delete-task').split('|');
      const sp = g.sprints.find(s=>s.id===spId);
      sp.tasks = sp.tasks.filter(t=>t.id!==taskId);
      persistGoals(); render();
    });
  });

  document.querySelectorAll('[data-edit-sprint-title]').forEach(el=>{
    el.addEventListener('blur', ()=>{
      const sp = g.sprints.find(s=>s.id===el.getAttribute('data-edit-sprint-title'));
      sp.label = el.textContent.trim() || sp.label;
      persistGoals();
    });
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); el.blur(); } });
  });

  document.querySelectorAll('[data-edit-task]').forEach(el=>{
    el.addEventListener('blur', ()=>{
      const [spId, taskId] = el.getAttribute('data-edit-task').split('|');
      const t = g.sprints.find(s=>s.id===spId).tasks.find(t=>t.id===taskId);
      t.text = el.textContent.trim() || t.text;
      persistGoals();
    });
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); el.blur(); } });
  });

  document.querySelectorAll('[data-edit-ifthen]').forEach(el=>{
    el.addEventListener('blur', ()=>{
      const [spId, taskId] = el.getAttribute('data-edit-ifthen').split('|');
      const t = g.sprints.find(s=>s.id===spId).tasks.find(t=>t.id===taskId);
      t.ifThen = el.textContent.trim();
      persistGoals();
    });
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); el.blur(); } });
  });

  document.querySelectorAll('[data-day-cell]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      const [goalId, actionId, iso] = el.getAttribute('data-day-cell').split('|');
      const goal = getGoal(goalId);
      const action = goal.dailyActions.find(a=>a.id===actionId);
      const monthKey = iso.slice(0,7);
      const usedFreezes = goal.dailyActions.reduce((s,a)=> s + Object.keys(a.freezes).filter(d=>d.startsWith(monthKey)).length, 0);
      if (e.shiftKey){
        if (action.freezes[iso]) delete action.freezes[iso];
        else if (usedFreezes < state.freezeBudget){ action.freezes[iso]=true; delete action.completions[iso]; showToast('Freeze applied — streak protected.', 'snow'); }
        else { showToast('No freezes left this month.', 'x'); return; }
      } else {
        if (action.completions[iso]) delete action.completions[iso];
        else { action.completions[iso]=true; delete action.freezes[iso]; if (iso===fmt(today())) fireConfetti(); }
      }
      persistGoals(); render();
    });
  });
}

/* =========================================================================
   TOAST + CONFETTI
   ========================================================================= */
function showToast(msg, icon){
  const el = document.createElement('div');
  el.className = 'toast' + (icon==='x' ? ' err' : '');
  el.innerHTML = `${svgIcon(icon||'check')}<span>${escapeHtml(msg)}</span>`;
  document.body.appendChild(el);
  setTimeout(()=> el.remove(), 2600);
}
function fireConfetti(){
  const colors = ['#ff6a39','#2fd8c4','#7dd3fc','#f3f1ea'];
  for(let i=0;i<24;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'vw';
    p.style.background = colors[i%colors.length];
    p.style.animationDelay = (Math.random()*0.2)+'s';
    p.style.borderRadius = Math.random()>0.5 ? '50%':'2px';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 1400);
  }
}

render();
</script>
